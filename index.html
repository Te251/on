<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Star Start</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for premium typography styling -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN script -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .display-font {
        font-family: 'Space Grotesk', sans-serif;
      }
      .mono-font {
        font-family: 'JetBrains Mono', sans-serif;
      }
      
      /* Smooth scrollbars for lyrics */
      .custom-scrollbar::-webkit-scrollbar {
        width: 5px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e5e5e5;
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #d4d4d4;
      }
      
      /* Keyframe animations for floating bubbles */
      @keyframes floatUp {
        0% {
          transform: translateY(100%) scale(0.5);
          opacity: 0;
        }
        10% {
          opacity: 0.8;
        }
        90% {
          opacity: 0.8;
        }
        100% {
          transform: translateY(-20vh) scale(1.2);
          opacity: 0;
        }
      }
      .note-bubble {
        animation: floatUp 4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }
    </style>
  </head>
  <body class="relative min-h-screen bg-gradient-to-tr from-amber-50 via-neutral-50 to-rose-50 text-neutral-800 flex flex-col justify-between overflow-x-hidden select-none">
    
    <!-- Ambient glowing backgrounds -->
    <div class="absolute top-[-15%] left-[-15%] w-[60vw] h-[60vw] rounded-full bg-rose-200/20 blur-[130px] pointer-events-none"></div>
    <div class="absolute bottom-[-15%] right-[-15%] w-[60vw] h-[60vw] rounded-full bg-amber-200/20 blur-[130px] pointer-events-none"></div>

    <!-- Hidden native audio controller streaming MP3 -->

    <div id="floating-notes-container" class="absolute inset-0 pointer-events-none overflow-hidden z-20"></div>

    <!-- Top Header -->

      <div class="flex items-center gap-2.5">
        <div id="logo-badge" class="w-10 h-10 rounded-xl bg-gradient-to-tr from-amber-500 to-amber-400 flex items-center justify-center text-white shadow-md shadow-amber-500/15">
          <i data-lucide="headphones" class="w-5 h-5 stroke-[2.2]"></i>
        </div>
        <div>
          <p class="text-[10px] mono-font tracking-wider text-amber-600/80 font-bold flex items-center gap-1 uppercase">
            <span class="w-1.5 h-1.5 rounded-full bg-amber-500 inline-block animate-ping"></span>
            Ambient Studio
          </p>
        </div>
      </div>

      <div class="flex items-center gap-2">
        <button id="headset-indicator" class="px-3.5 py-1.5 rounded-full bg-white/80 border border-neutral-200/40 backdrop-blur-md text-xs font-semibold text-neutral-600 flex items-center gap-1.5 shadow-sm transition-all hover:bg-white">
          <i data-lucide="headphones" class="w-3.5 h-3.5 text-neutral-400 transition-all" id="headset-icon"></i>
          <span>Headset Mode On</span>
        </button>
      </div>
    </header>

    <!-- Main Container Layout -->

      <div class="w-full flex flex-col lg:flex-row gap-6 items-stretch justify-center">

        <section id="player-card" class="w-full lg:w-full transition-all duration-500 ease-in-out" style="width: 100%;">

            <!-- Now Playing Header -->

                <i data-lucide="sparkles" class="w-3.5 h-3.5 animate-spin text-amber-600"></i>
                Now Playing
              </span>
              
              <div class="flex items-center gap-2">
                <button id="toggle-lyrics-btn" class="px-3 py-1.5 rounded-xl border border-neutral-200/50 text-[11px] font-bold flex items-center gap-1.5 transition-all bg-white text-neutral-600 hover:bg-neutral-50/85 shadow-sm cursor-pointer">
                  <i data-lucide="bookmark" class="w-3.5 h-3.5"></i>
                  <span>가사 보기</span>
                </button>
                
                <button id="like-btn" class="p-2 rounded-xl text-neutral-400 hover:text-rose-500 hover:bg-neutral-50 transition-all cursor-pointer">
                  <i data-lucide="heart" class="w-4 h-4" id="like-icon"></i>
                </button>
              </div>
            </div>

            <!-- Cover Image Visual Panel -->

              <div class="relative w-48 h-48 md:w-56 md:h-56 rounded-2xl overflow-hidden shadow-2xl border-[4px] border-white group">
                <img

                  alt="Album Cover"
                  class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
                />

                  <div class="w-12 h-12 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center text-white" id="hover-headphones-ring">
                    <i data-lucide="headphones" class="w-6 h-6"></i>
                  </div>
                </div>
              </div>

              <!-- Animated Wave Visualizer -->
              <div id="wave-container" class="h-5 w-full flex items-center justify-center gap-1.5 mt-6 px-10">
                <!-- Javascript will inject reactive bars smoothly -->
              </div>
            </div>

            <!-- Title and Creator metadata -->

                Star Start
              </h2>

                <span class="w-1.5 h-1.5 rounded-full bg-neutral-300"></span>

            </div>

                </button>

        </section>

      </div>
    </main>

      <p class="text-xs text-neutral-400/80 mono-font">
        © 2026 Tetriss sound project. All rights reserved.
      </p>
    </footer>

      let currentSongIndex = 0;

      // Build static lyrics HTML representation
      function loadLyrics() {
        lyricsScrollBox.innerHTML = '';
        const currentLyrics = PLAYLIST_DATA[currentSongIndex].lyrics;
        currentLyrics.forEach(line => {
          if (line === "") {
            const spacer = document.createElement('div');
            spacer.className = 'h-4';
            lyricsScrollBox.appendChild(spacer);
          } else {
            const para = document.createElement('p');
            para.className = 'text-xs md:text-[13px] leading-relaxed text-neutral-600 hover:text-neutral-950 transition-colors duration-200';
            para.textContent = line;
            lyricsScrollBox.appendChild(para);
          }
        });
      }

        container.innerHTML = '';
        PLAYLIST_DATA.forEach((song, idx) => {
          const isActive = idx === currentSongIndex;
          const div = document.createElement('div');
          
          div.className = `flex items-center justify-between p-2 md:p-2.5 rounded-xl cursor-pointer transition-all duration-300 border ${
            isActive 
              ? 'bg-amber-500/10 border-amber-500/20 text-neutral-900 shadow-sm' 
              : 'bg-white/40 border-transparent hover:bg-neutral-100/60 text-neutral-600 hover:text-neutral-900'
          }`;
          
          div.innerHTML = `
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 md:w-9 md:h-9 rounded-lg overflow-hidden border border-neutral-200/50 flex-shrink-0 relative">
                <img src="${song.coverUrl}" class="w-full h-full object-cover" />
                ${isActive && isPlaying ? `
                  <div class="absolute inset-0 bg-black/20 flex items-center justify-center">
                    <div class="flex gap-0.5 items-end justify-center w-5 h-5">
                      <div class="w-0.5 bg-white h-2.5 animate-bounce" style="animation-delay: 0.1s"></div>
                      <div class="w-0.5 bg-white h-4 animate-bounce" style="animation-delay: 0.3s"></div>
                      <div class="w-0.5 bg-white h-1.5 animate-bounce" style="animation-delay: 0.5s"></div>
                    </div>
                  </div>
                ` : ''}
              </div>
              <div class="text-left">
                <p class="text-[11px] md:text-xs font-bold truncate max-w-[150px] md:max-w-[200px]">${song.title}</p>
                <p class="text-[9px] md:text-[10px] text-neutral-400 font-medium">created by • ${song.artist}</p>
              </div>
            </div>
            <div class="flex items-center">
              ${isActive ? `
                <span class="text-[9px] md:text-[10px] font-bold text-amber-600 bg-amber-100 px-2 py-0.5 rounded-md flex items-center gap-0.5">
                  재생중
                </span>
              ` : `
                <div class="p-1.5 rounded-lg bg-neutral-100/80 hover:bg-amber-100 text-neutral-500 hover:text-amber-700 transition-colors">
                  <i data-lucide="play" class="w-3 h-3 fill-current"></i>
                </div>
              `}
            </div>
          `;
          
          div.addEventListener('click', () => {
            selectSong(idx);
          });
          
          container.appendChild(div);
        });
        updateIcons();
      }

      // Song selection change
      function selectSong(idx) {
        if (idx === currentSongIndex) {
          togglePlay();
          return;
        }
        
        currentSongIndex = idx;
        const song = PLAYLIST_DATA[currentSongIndex];
        
        audio.src = song.audioUrl;
        albumArt.src = song.coverUrl;
        document.getElementById('song-title').innerText = song.title;
        document.getElementById('song-artist').innerText = song.artist;
        
        progressBar.style.width = '0%';
        progressHandle.style.left = '0%';
        currentTimeTxt.innerText = "00:00";
        durationTimeTxt.innerText = "00:00";
        
        loadLyrics();
        renderPlaylist();
        
        audio.play().then(() => {
          setPlayState(true);
          errorBanner.classList.add('hidden');
        }).catch(err => {
          console.warn("Autoplay blocked on direct song selection or load:", err);
          setPlayState(false);
        });
      }

      // Render custom sound waves indicators
      const totalBars = 16;
      function renderVisualizer() {
        waveContainer.innerHTML = '';
        for (let i = 0; i < totalBars; i++) {
          const bar = document.createElement('div');
          bar.className = 'w-1 bg-amber-400 rounded-full transition-all duration-150';
          bar.style.height = '4px';
          waveContainer.appendChild(bar);
        }
      }

      let visualizerInterval = null;
      function animateVisualizer() {
        if (!audio.paused) {
          const bars = waveContainer.children;
          for (let i = 0; i < bars.length; i++) {
            const randomHeight = Math.max(4, Math.floor(Math.random() * 20));
            bars[i].style.height = `${randomHeight}px`;
          }
        } else {
          const bars = waveContainer.children;
          for (let i = 0; i < bars.length; i++) {
            bars[i].style.height = '4px';
          }
        }
      }

      function startVisuals() {
        if (!visualizerInterval) {
          visualizerInterval = setInterval(animateVisualizer, 180);
        }
      }

      function stopVisuals() {
        if (visualizerInterval) {
          clearInterval(visualizerInterval);
          visualizerInterval = null;
          animateVisualizer(); // Reset to flat
        }
      }

      // Floating note emitter bubble
      function spawnFloatingNote() {
        if (audio.paused) return;
        const notes = ['♫', '♬', '♪', '♩', '❤', '⭐'];
        const randomNote = notes[Math.floor(Math.random() * notes.length)];
        const bubble = document.createElement('div');
        bubble.className = 'note-bubble absolute bottom-[40vh] text-amber-500 font-semibold text-lg drop-shadow-md filter blur-[0.5px] pointer-events-none';
        bubble.textContent = randomNote;
        
        // Random horizontal percent
        const xPos = Math.floor(Math.random() * 80) + 10;
        bubble.style.left = `${xPos}%`;
        
        floatingContainer.appendChild(bubble);
        setTimeout(() => {
          bubble.remove();
        }, 4000);
      }

      // Interval for floating notes on play
      let notesInterval = null;

      // Track states
      let isPlaying = false;
      let isMuted = false;
      let isLiked = false;
      let isLyricsOpen = false;

      // Handle icons refresh
      function updateIcons() {
        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }
      }

      // Explicit Play State Handler to prevent Lucide DOM Detachment Bugs
      function setPlayState(playing) {
        isPlaying = playing;
        if (playing) {
          btnPlayPause.innerHTML = `<i data-lucide="pause" class="w-5 h-5 fill-white" id="play-pause-icon"></i>`;
          btnPlayPause.classList.add('shadow-amber-500/35');
          albumArt.classList.add('scale-105');
          startVisuals();
          if (!notesInterval) {
            notesInterval = setInterval(spawnFloatingNote, 1200);
          }
        } else {
          btnPlayPause.innerHTML = `<i data-lucide="play" class="w-5 h-5 fill-white translate-x-[1px]" id="play-pause-icon"></i>`;
          btnPlayPause.classList.remove('shadow-amber-500/35');
          albumArt.classList.remove('scale-105');
          stopVisuals();
          if (notesInterval) {
            clearInterval(notesInterval);
            notesInterval = null;
          }
        }
        updateIcons();
      }

      // Main audio triggers
      function togglePlay() {
        if (audio.paused) {
          audio.play().then(() => {
            setPlayState(true);
            errorBanner.classList.add('hidden');
          }).catch(err => {
            console.warn("Autoplay was blocked by browser:", err);
            errorBanner.classList.remove('hidden');
            errorTxt.innerText = "음악을 재생하려면 화면의 아무 곳이나 터치/클릭해주세요.";
            setPlayState(false);
          });
        } else {
          audio.pause();
          setPlayState(false);
        }
      }

      // Format time representation
      function formatTime(secondValue) {
        if (isNaN(secondValue)) return "00:00";
        const mins = Math.floor(secondValue / 60);
        const secs = Math.floor(secondValue % 60);
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      }

      // Update seek tracker progress
      audio.addEventListener('timeUpdate', () => {
        // Handled in direct triggers
      });

      // Time change progress triggers
      audio.ontimeupdate = function() {
        const cur = audio.currentTime;
        const dur = audio.duration || 0;
        currentTimeTxt.innerText = formatTime(cur);
        if (dur > 0) {
          const percent = (cur / dur) * 100;
          progressBar.style.width = `${percent}%`;
          progressHandle.style.left = `calc(${percent}% - 7px)`;
        }
        
        // Spawn small note indicators dynamically
        if (Math.random() < 0.05) {
          spawnFloatingNote();
        }
      };

      audio.onloadedmetadata = function() {
        durationTimeTxt.innerText = formatTime(audio.duration);
      };

      audio.onended = function() {
        const nextIndex = (currentSongIndex + 1) % PLAYLIST_DATA.length;
        selectSong(nextIndex);
      };

      // Progress seeking handle
      progressContainer.addEventListener('click', (e) => {
        const rect = progressContainer.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const width = rect.width;
        const percentage = Math.max(0, Math.min(1, clickX / width));
        
        const dur = audio.duration || 0;
        if (dur > 0) {
          audio.currentTime = percentage * dur;
        }
      });

      // Controller callbacks
      btnPlayPause.addEventListener('click', togglePlay);
      
      btnSkipBack.addEventListener('click', () => {
        audio.currentTime = Math.max(0, audio.currentTime - 10);
      });

      btnRestart.addEventListener('click', () => {
        audio.currentTime = 0;
        audio.play().then(() => {
          setPlayState(true);
        }).catch(() => {
          setPlayState(false);
        });
      });

      btnPrevSong.addEventListener('click', () => {
        const prevIndex = (currentSongIndex - 1 + PLAYLIST_DATA.length) % PLAYLIST_DATA.length;
        selectSong(prevIndex);
      });

      btnNextSong.addEventListener('click', () => {
        const nextIndex = (currentSongIndex + 1) % PLAYLIST_DATA.length;
        selectSong(nextIndex);
      });

      // Mute handler
      btnMute.addEventListener('click', () => {
        isMuted = !isMuted;
        audio.muted = isMuted;
        if (isMuted) {
          btnMute.innerHTML = `<i data-lucide="volume-x" class="w-4 h-4" id="mute-icon"></i>`;
        } else {
          btnMute.innerHTML = `<i data-lucide="volume-2" class="w-4 h-4" id="mute-icon"></i>`;
        }
        updateIcons();
      });

      // Volume slider input
      volumeSlider.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        audio.volume = val;
        if (val === 0) {
          btnMute.innerHTML = `<i data-lucide="volume-x" class="w-4 h-4" id="mute-icon"></i>`;
        } else {
          btnMute.innerHTML = `<i data-lucide="volume-2" class="w-4 h-4" id="mute-icon"></i>`;
          audio.muted = false;
          isMuted = false;
        }
        updateIcons();
      });

      // Like item toggle
      likeBtn.addEventListener('click', () => {
        isLiked = !isLiked;
        if (isLiked) {
          likeBtn.innerHTML = `<i data-lucide="heart" class="w-4 h-4 fill-rose-500 text-rose-500" id="like-icon"></i>`;
        } else {
          likeBtn.innerHTML = `<i data-lucide="heart" class="w-4 h-4 text-neutral-400" id="like-icon"></i>`;
        }
        updateIcons();
      });

      // Toggle Lyrics Box layout
      toggleLyricsBtn.addEventListener('click', () => {
        isLyricsOpen = !isLyricsOpen;
        if (isLyricsOpen) {
          lyricsCard.style.display = 'flex';
          playerCard.style.width = '55%';
          toggleLyricsBtn.className = "px-3 py-1.5 rounded-xl border border-neutral-200/50 text-[11px] font-bold flex items-center gap-1.5 transition-all bg-amber-500 text-white hover:opacity-95 shadow-sm cursor-pointer";
          toggleLyricsBtn.innerHTML = `<i data-lucide="bookmark" class="w-3.5 h-3.5 fill-white"></i><span>가사 닫기</span>`;
        } else {
          lyricsCard.style.display = 'none';
          playerCard.style.width = '100%';
          toggleLyricsBtn.className = "px-3 py-1.5 rounded-xl border border-neutral-200/50 text-[11px] font-bold flex items-center gap-1.5 transition-all bg-white text-neutral-600 hover:bg-neutral-50/85 shadow-sm cursor-pointer";
          toggleLyricsBtn.innerHTML = `<i data-lucide="bookmark" class="w-3.5 h-3.5"></i><span>가사 보기</span>`;
        }
        updateIcons();
      });

      // Headset Mode Button toggle feedback
      headsetIndicator.addEventListener('click', () => {
        headsetIndicator.classList.add('scale-95');
        setTimeout(() => headsetIndicator.classList.remove('scale-95'), 150);
        headsetIcon.classList.add('text-amber-500', 'animate-bounce');
        setTimeout(() => headsetIcon.classList.remove('animate-bounce'), 1000);
      });

      // Initialize
      window.addEventListener('DOMContentLoaded', () => {
        loadLyrics();
        renderPlaylist();
        renderVisualizer();
        updateIcons();

        // Autoplay Logic - modern browser friendly implementation
        setTimeout(() => {
          audio.play().then(() => {
            setPlayState(true);
            errorBanner.classList.add('hidden');
          }).catch(err => {
            console.warn("Muted or blocked autoplay by browser policy. Adding body click event setup:", err);
            // Standalone user action listener triggers on first physical browser click anywhere
            const userInteractionAutoplay = () => {
              audio.play().then(() => {
                setPlayState(true);
                errorBanner.classList.add('hidden');
              }).catch(e => console.error(e));
              document.removeEventListener('click', userInteractionAutoplay);
              document.removeEventListener('touchstart', userInteractionAutoplay);
            };
            document.addEventListener('click', userInteractionAutoplay);
            document.addEventListener('touchstart', userInteractionAutoplay);
          });
        }, 150);
      });
    </script>
  </body>
</html>
